<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Patient Care</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Patient Care">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/825/825590.png">
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiUGF0aWVudCBDYXJlIiwic2hvcnRfbmFtZSI6IlBhdGllbnQgQ2FyZSIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwic3RhcnRfdXJsIjoiLiIsImljb25zIjpbeyJzcmMiOiJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi84MjUvODI1NTkwLnBuZyIsInNpemVzIjoiNTEyeDUxMiIsInR5cGUiOiJpbWFnZS9wbmcifV19">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #1a1a1a;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        
        .app-container {
            background: #ffffff;
            width: 100%;
            max-width: 460px;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            padding: 32px;
            box-sizing: border-box;
        }
        
        h2 {
            font-weight: 500;
            font-size: 1.4rem;
            letter-spacing: -0.02em;
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            color: #1a1a1a;
        }
        
        h3 {
            font-weight: 500;
            font-size: 1.05rem;
            margin-top: 0;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        
        .section-box {
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #8c8c8c;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        input[type="text"], input[type="date"], input[type="time"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #ffffff;
            color: #1a1a1a;
            transition: all 0.2s;
        }
        
        input:focus, select:focus { outline: none; border-color: #1a1a1a; }
        .edit-highlight { border-color: #007bff !important; background-color: #fbfdff !important; }
        .flex-row { display: flex; gap: 8px; }
        .time-control-group { display: flex; align-items: center; gap: 4px; width: 100%; }
        
        button {
            padding: 12px 16px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-black { background-color: #1a1a1a; color: #ffffff; }
        .btn-black:hover { background-color: #333333; }
        .btn-subtle { background-color: #f0f0f0; color: #1a1a1a; }
        .btn-subtle:hover { background-color: #e5e5e5; }
        .btn-time-adj { padding: 12px 10px; background-color: #f5f5f5; color: #333; font-size: 0.8rem; font-family: monospace; white-space: nowrap; }
        
        .btn-outline { background-color: transparent; border: 1px solid #e0e0e0; color: #666666; width: 100%; margin-bottom: 24px; }
        .btn-outline:hover { border-color: #1a1a1a; color: #1a1a1a; }
        .btn-danger-outline { background-color: transparent; border: 1px solid #f0f0f0; color: #999999; width: 100%; font-size: 0.85rem; }
        .btn-danger-outline:hover { border-color: #ff4d4f; color: #ff4d4f; background-color: #fff1f0; }
        
        .chips-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; min-height: 35px; }
        
        /* 🍎 ปรับปรุงสไตล์ชิปแบบแยกส่วนสัมผัสเพื่อความเสถียรบน iPhone */
        .category-chip { 
            display: inline-flex;
            align-items: center;
            background-color: #f5f5f5; 
            border-radius: 16px; 
            font-size: 0.85rem; 
            color: #333; 
            border: 1px solid #e5e5e5; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: manipulation;
            overflow: hidden;
        }
        .chip-text-btn {
            padding: 6px 4px 6px 12px;
            cursor: pointer;
        }
        .chip-text-btn:active { background-color: #e5e5e5; }
        
        .chip-edit-btn {
            padding: 6px 12px 6px 6px;
            color: #999;
            cursor: pointer;
            border-left: 1px solid #e5e5e5;
            font-size: 0.75rem;
        }
        .chip-edit-btn:active { background-color: #e5e5e5; color: #1a1a1a; }

        .category-card { margin-bottom: 28px; }
        .category-title { font-weight: 600; font-size: 0.95rem; color: #1a1a1a; margin-bottom: 12px; border-bottom: 1px solid #1a1a1a; padding-bottom: 6px; display: inline-block; }
        ul { list-style-type: none; padding: 0; margin: 0; }
        li { padding: 12px 0; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; }
        li:last-child { border-bottom: none; }
        
        .task-content-wrapper { display: flex; align-items: center; flex: 1; padding-right: 12px; }
        .btn-delete-x {
            background: none; border: none; color: #ff4d4f; font-size: 1.2rem; font-weight: bold; 
            cursor: pointer; padding: 0 10px 0 0; transition: color 0.2s; line-height: 1;
        }
        .btn-delete-x:hover { color: #cf1322; }
        .task-text { color: #333333; font-size: 0.95rem; }
        
        .task-badge-group { display: flex; align-items: center; gap: 12px; }
        .task-date { font-size: 0.8rem; color: #999999; }
        .task-time { font-weight: 500; color: #1a1a1a; background: #f0f0f0; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .btn-edit { font-size: 0.8rem; color: #007bff; cursor: pointer; background: none; border: none; padding: 0; }
        .btn-edit:hover { text-decoration: underline; }
        .hint-text { font-size: 0.75rem; color: #999999; margin: 10px 0 0 0; text-align: center; font-style: italic; }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Patient Care</h2>

        <button class="btn-outline" onclick="requestNotificationPermission()">
            เปิดใช้งานการแจ้งเตือนระบบ
        </button>

        <div class="section-box">
            <label>จัดการหมวดหมู่ (คลิกชื่อเพื่อเลือก / คลิก ✏️ เพื่อแก้ไขชื่อ)</label>
            <div class="flex-row">
                <input type="text" id="new-category-input" placeholder="เพิ่มหมวดหมู่ใหม่ เช่น เตียง 3">
                <button class="btn-subtle" onclick="addCategory()">เพิ่ม</button>
            </div>
            <div class="chips-container" id="category-chips-zone"></div>
        </div>

        <div class="section-box">
            <h3 id="form-title">เพิ่มรายการที่ต้องทำ</h3>
            <div class="input-group">
                <label>หมวดหมู่ / เตียง</label>
                <select id="category-select"></select>
            </div>

            <div class="input-group">
                <label>สิ่งที่ต้องทำ / สั่งงานด้วยเสียงรวดเดียวจบ</label>
                <div class="flex-row" style="margin-bottom: 8px;">
                    <input type="text" id="task-input" placeholder="พิมพ์รายการงานที่นี่...">
                    <button class="btn-black" onclick="startAllInOneDictation()">🎤 พูดเพื่อเพิ่ม</button>
                </div>
                <p class="hint-text" style="text-align: left; margin-top: 2px; color: #8c8c8c;">
                    *พูดรวดเดียวจบได้ เช่น: "เตียง 1 พลิกตัวผู้ป่วย วันนี้ ตอนบ่ายสามโมงครึ่ง"*
                </p>
            </div>

            <div class="input-group">
                <label>วันและเวลาที่ให้แจ้งเตือน</label>
                <div class="flex-row">
                    <input type="date" id="date-input">
                    <div class="time-control-group">
                        <button class="btn-time-adj" onclick="adjustTime(-15)">-15m</button>
                        <input type="time" id="time-input">
                        <button class="btn-time-adj" onclick="adjustTime(15)">+15m</button>
                    </div>
                </div>
            </div>

            <button class="btn-black" id="btn-submit-task" style="width: 100%; margin-top: 4px;" onclick="addTask()">บันทึกรายการ</button>
        </div>

        <div class="section-box" style="border-bottom: none; margin-bottom: 12px; padding-bottom: 0;">
            <button class="btn-danger-outline" id="cancel-voice-btn" onclick="startVoiceCancel()">🎙️ พูดเพื่อยกเลิกงาน</button>
            <p class="hint-text">
                *ตัวอย่าง: "ยกเลิก เตียง 1 พลิกตัว" หรือ "เตียง 2 วัดความดัน"*
            </p>
        </div>

        <h3 style="text-align: left; margin-top: 24px; margin-bottom: 16px; border-top: 1px solid #eaeaea; padding-top: 24px;">ตารางงานล่วงหน้า</h3>
        <div id="task-board"></div>
    </div>

    <script>
        let categories = ["เตียง 1", "เตียง 2"]; 
        let tasks = []; 
        let editingTaskId = null; 

        function initApp() {
            try {
                const localCat = localStorage.getItem('local_categories');
                const localTasks = localStorage.getItem('local_tasks');
                if (localCat) categories = JSON.parse(localCat);
                if (localTasks) tasks = JSON.parse(localTasks);
            } catch(e) {
                console.error("การโหลดข้อมูลขัดข้อง", e);
            }

            // 🛡️ Data Recovery Guard: ตรวจจับและกู้คืนปุ่มหายอัตโนมัติ หายค้างแน่นอน
            if (!categories || !Array.isArray(categories) || categories.length === 0) {
                categories = ["เตียง 1", "เตียง 2"];
                saveToDevice();
            }
            if (!tasks || !Array.isArray(tasks)) { tasks = []; }

            updateCategoryDropdown();
            renderCategoryChips(); 
            setDefaultDate(); 
            renderTaskBoard();
        }

        function saveToDevice() {
            localStorage.setItem('local_categories', JSON.stringify(categories));
            localStorage.setItem('local_tasks', JSON.stringify(tasks));
        }

        function setDefaultDate() {
            const now = new Date();
            document.getElementById('date-input').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function adjustTime(minutesToChange) {
            const timeInput = document.getElementById('time-input');
            let currentTimeVal = timeInput.value;
            if (!currentTimeVal) {
                const now = new Date();
                currentTimeVal = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            }
            let [hours, minutes] = currentTimeVal.split(':').map(Number);
            let totalMinutes = (hours * 60) + minutes + minutesToChange;
            if (totalMinutes < 0) totalMinutes += 1440;
            if (totalMinutes >= 1440) totalMinutes -= 1440;
            timeInput.value = `${String(Math.floor(totalMinutes / 60)).padStart(2, '0')}:${String(totalMinutes % 60).padStart(2, '0')}`;
        }

        function normalizeThaiNumbers(text) {
            const thaiNumbers = { "หนึ่ง": "1", "สอง": "2", "สาม": "3", "สี่": "4", "ห้า": "5", "หก": "6", "เจ็ด": "7", "แปด": "8", "เก้า": "9", "ศูนย์": "0" };
            let normalized = text;
            for (let word in thaiNumbers) { normalized = normalized.replace(new RegExp(word, 'g'), thaiNumbers[word]); }
            return normalized;
        }

        function formatDateDisplay(dateStr) {
            if (!dateStr) return "";
            const [year, month, day] = dateStr.split('-');
            const thaiYear = parseInt(year) + 543; 
            return `${day}/${month}/${thaiYear}`;
        }

        function requestNotificationPermission() {
            const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
            const isStandalone = ('standalone' in window.navigator) && window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
            if (isIos && !isStandalone) {
                alert("🚨 สำหรับ iPhone / iPad:\nกรุณากดปุ่ม 📤 (Share/แชร์) ด้านล่าง\nแล้วเลือก ➕ 'เพิ่มไปยังหน้าจอโฮม' (Add to Home Screen) ก่อนครับ\n\nจากนั้นให้เปิดแอปจากหน้าจอหลัก ถึงจะสามารถรับการแจ้งเตือนได้ครับ");
                return;
            }
            if (!("Notification" in window)) { alert("เบราว์เซอร์นี้ไม่รองรับการแจ้งเตือนระบบครับ"); return; }
            Notification.requestPermission().then(permission => { if (permission === "granted") alert("🔓 เปิดการแจ้งเตือนสำเร็จ!"); });
        }

        function addCategory() {
            const newCat = document.getElementById('new-category-input').value.trim();
            if (!newCat) return;
            if (categories.includes(newCat)) { alert("หมวดหมู่นี้มีอยู่แล้วครับ"); return; }
            categories.push(newCat);
            document.getElementById('new-category-input').value = "";
            updateCategoryDropdown();
            renderCategoryChips();
            renderTaskBoard();
            saveToDevice();
        }

        function updateCategoryDropdown() {
            const select = document.getElementById('category-select');
            select.innerHTML = "";
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat; option.textContent = cat; select.appendChild(option);
            });
        }

        // 🛠️ แก้ไขเสร็จสมบูรณ์: แยกปุ่ม text และปุ่มดินสอออกจากกัน แก้ปัญหาระบบ iOS PWA บล็อกโค้ดค้างยาวหายขาด
        function renderCategoryChips() {
            const zone = document.getElementById('category-chips-zone');
            zone.innerHTML = "";
            
            if (!categories || categories.length === 0) categories = ["เตียง 1", "เตียง 2"];

            categories.forEach(cat => {
                const chip = document.createElement('div');
                chip.className = 'category-chip';
                
                // สร้างส่วนตัวหนังสือ สำหรับคลิก 1 ครั้งเพื่อเลือกหมวดหมู่
                const textBtn = document.createElement('div');
                textBtn.className = 'chip-text-btn';
                textBtn.textContent = cat;
                textBtn.onclick = function() {
                    document.getElementById('category-select').value = cat;
                };

                // สร้างส่วนไอคอนรูปดินสอ สำหรับคลิก 1 ครั้งเพื่อแก้ไขชื่อ
                const editBtn = document.createElement('div');
                editBtn.className = 'chip-edit-btn';
                editBtn.innerHTML = "✏️";
                editBtn.onclick = function() {
                    renameCategory(cat);
                };

                chip.appendChild(textBtn);
                chip.appendChild(editBtn);
                zone.appendChild(chip);
            });
        }

        function renameCategory(oldName) {
            const newName = prompt(`แก้ไขชื่อหมวดหมู่ "${oldName}" เป็น:`, oldName);
            if (!newName) return;
            const trimmedNewName = newName.trim();
            if (!trimmedNewName || trimmedNewName === oldName) return;
            if (categories.includes(trimmedNewName)) { alert("ชื่อหมวดหมู่นี้มีอยู่แล้วในระบบครับ"); return; }
            const idx = categories.indexOf(oldName);
            if (idx > -1) categories[idx] = trimmedNewName;
            tasks.forEach(task => { if (task.category === oldName) task.category = trimmedNewName; });
            updateCategoryDropdown();
            renderCategoryChips();
            renderTaskBoard();
            saveToDevice();
        }

        function startAllInOneDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('SpeechRecognition')) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.lang = 'th-TH';
                
                const taskInput = document.getElementById('task-input');
                const originalPlaceholder = taskInput.placeholder;
                taskInput.placeholder = "กำลังฟังเสียง (พูดงาน วันและเวลาได้เลย)...";

                recognition.onresult = function(event) {
                    let transcript = event.results[0][0].transcript.trim();
                    let normalizedTranscript = normalizeThaiNumbers(transcript);
                    taskInput.placeholder = originalPlaceholder;

                    const now = new Date();
                    let targetDate = new Date(now);
                    let hours = now.getHours();
                    let minutes = 0;
                    let hasTimeInfo = false;

                    if (normalizedTranscript.includes("วันนี้")) {
                    } else if (normalizedTranscript.includes("พรุ่งนี้")) {
                        targetDate.setDate(now.getDate() + 1);
                    } else if (normalizedTranscript.includes("มะรืน")) {
                        targetDate.setDate(now.getDate() + 2);
                    } else {
                        const dateMatch = normalizedTranscript.match(/วันที่\s*(\d+)/);
                        if (dateMatch) { targetDate.setDate(parseInt(dateMatch[1])); }
                    }

                    const timeISO = normalizedTranscript.match(/(\d{1,2})[:.\s](\d{2})/);
                    if (timeISO) {
                        hours = parseInt(timeISO[1]); minutes = parseInt(timeISO[2]); hasTimeInfo = true;
                    } else {
                        const wordClock = normalizedTranscript.match(/(\d+)\s*นาฬิกา/); 
                        const wordHour = normalizedTranscript.match(/(\d+)\s*โมง/); 
                        const wordTee = normalizedTranscript.match(/ตี\s*(\d+)/); 
                        const wordBaimong = normalizedTranscript.match(/บ่าย\s*(\d+)/);
                        
                        if (wordClock) { hours = parseInt(wordClock[1]); hasTimeInfo = true; } 
                        else if (wordHour) {
                            hours = parseInt(wordHour[1]); hasTimeInfo = true;
                            if (normalizedTranscript.includes("บ่าย") && hours < 12) hours += 12;
                            if (normalizedTranscript.includes("เย็น") && hours < 12) hours += 12;
                        } 
                        else if (wordTee) { hours = parseInt(wordTee[1]); hasTimeInfo = true; } 
                        else if (wordBaimong) { hours = parseInt(wordBaimong[1]) + 12; hasTimeInfo = true; } 
                        else if (normalizedTranscript.includes("ทุ่ม")) {
                            const wordToom = normalizedTranscript.match(/(\d+)\s*ทุ่ม/);
                            hours = wordToom ? parseInt(wordToom[1]) + 18 : 19;
                            hasTimeInfo = true;
                        }

                        const wordMinute = normalizedTranscript.match(/(\d+)\s*นาที/);
                        if (wordMinute) { minutes = parseInt(wordMinute[1]); } 
                        else if (normalizedTranscript.includes("ครึ่ง")) { minutes = 30; } 
                        else {
                            const trailingNum = normalizedTranscript.match(/(?:โมง|นาฬิกา|ทุ่ม|ตี)\s*(\d+)/);
                            if (trailingNum) { minutes = parseInt(trailingNum[1]); }
                        }
                    }

                    if (isNaN(hours) || hours < 0 || hours > 23) hours = now.getHours();
                    if (isNaN(minutes) || minutes < 0 || minutes > 59) minutes = 0;

                    let matchedCategory = null;
                    const sortedCategories = [...categories].sort((a, b) => b.length - a.length);
                    for (let cat of sortedCategories) {
                        const cleanTranscript = transcript.replace(/\s+/g, '');
                        const cleanNormalized = normalizedTranscript.replace(/\s+/g, '');
                        const cleanCat = cat.replace(/\s+/g, '');
                        if (cleanTranscript.includes(cleanCat) || transcript.includes(cat) || cleanNormalized.includes(cleanCat)) {
                            matchedCategory = cat; break;
                        }
                    }

                    if (matchedCategory) {
                        document.getElementById('category-select').value = matchedCategory;
                    }

                    let taskOnly = normalizedTranscript;
                    if (matchedCategory) {
                        const normCat = normalizeThaiNumbers(matchedCategory);
                        taskOnly = taskOnly.replace(new RegExp(normCat, 'gi'), '');
                    }
                    
                    taskOnly = taskOnly.replace(/วันที่\s*\d+/g, '')
                                       .replace(/\d+[:.\s]\d+/g, '')
                                       .replace(/(ตี|บ่าย|ทุ่ม|โมง|นาฬิกา)\s*\d+/g, '')
                                       .replace(/\d+\s*(โมง|นาฬิกา|นาที)/g, '')
                                       .replace(/(วันนี้|พรุ่งนี้|มะรืน|ตอน|เวลา|ครึ่ง|โมง|นาฬิกา|ตี|บ่าย|ทุ่ม|นาที)/g, '')
                                       .replace(/^เตียง\s*\d+/g, '') 
                                       .replace(/\s+/g, ' ') 
                                       .trim();

                    taskInput.value = taskOnly;
                    document.getElementById('date-input').value = `${targetDate.getFullYear()}-${String(targetDate.getMonth() + 1).padStart(2, '0')}-${String(targetDate.getDate()).padStart(2, '0')}`;
                    
                    if (hasTimeInfo) {
                        const timeInput = document.getElementById('time-input');
                        timeInput.value = "";
                        setTimeout(() => { timeInput.value = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`; }, 50);
                    }
                };
                recognition.onerror = function() { taskInput.placeholder = originalPlaceholder; };
                recognition.start();
            }
        }

        function startVoiceCancel() {
            if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('SpeechRecognition')) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                recognition.lang = 'th-TH';
                const cancelBtn = document.getElementById('cancel-voice-btn');
                cancelBtn.textContent = "กำลังฟังเสียงเพื่อยกเลิก...";

                recognition.onresult = function(event) {
                    let transcript = event.results[0][0].transcript.trim();
                    let normalizedTranscript = normalizeThaiNumbers(transcript);
                    let cleanTranscript = transcript.replace(/\s+/g, '');
                    let cleanNormalized = normalizedTranscript.replace(/\s+/g, '');
                    let matchedCategory = null;

                    const sortedCategories = [...categories].sort((a, b) => b.length - a.length);
                    for (let cat of sortedCategories) {
                        const cleanCat = cat.replace(/\s+/g, '');
                        if (cleanTranscript.includes(cleanCat) || cleanNormalized.includes(cleanCat)) { matchedCategory = cat; break; }
                    }

                    if (!matchedCategory) { alert(`❌ ไม่พบชื่อเตียงจากเสียงพูด: "${transcript}"`); resetCancelButton(); return; }

                    const bedRegex = new RegExp(matchedCategory, 'gi');
                    const normCat = normalizeThaiNumbers(matchedCategory);
                    const bedNormRegex = new RegExp(normCat, 'gi');

                    let taskKeyword = normalizedTranscript.replace(bedRegex, '').replace(bedNormRegex, '').replace(/ยกเลิก/g, '').replace(/เตียง/g, '').trim();
                    let cleanKeyword = taskKeyword.replace(/\s+/g, '');

                    if (!cleanKeyword) { alert(`❌ กรุณาระบุชื่องานด้วยครับ`); resetCancelButton(); return; }

                    const initialCount = tasks.length;
                    tasks = tasks.filter(task => {
                        if (task.category === matchedCategory) {
                            const cleanTaskText = task.text.replace(/\s+/g, '');
                            if (cleanTaskText.includes(cleanKeyword) || cleanKeyword.includes(cleanTaskText)) return false; 
                        }
                        return true; 
                    });

                    if (tasks.length < initialCount) { alert(`🗑️ ยกเลิกรายการสำเร็จ`); renderTaskBoard(); saveToDevice(); } 
                    else { alert(`❌ ไม่พบงานที่มีคำว่า "${taskKeyword}" ในหมวด "${matchedCategory}"`); }
                    resetCancelButton();
                };
                recognition.onerror = function() { resetCancelButton(); };
                function resetCancelButton() { cancelBtn.textContent = "🎙️ พูดเพื่อยกเลิกงาน"; }
                recognition.start();
            }
        }

        function addTask() {
            const category = document.getElementById('category-select').value;
            const text = document.getElementById('task-input').value.trim();
            const date = document.getElementById('date-input').value; 
            const time = document.getElementById('time-input').value; 
            if (!text) { alert("❌ กรุณากรอกข้อความ 'สิ่งที่ต้องทำ' ครับ"); return; }
            if (!date) { alert("❌ กรุณาเลือก 'วันที่' ครับ"); return; }
            if (!time) { alert("❌ กรุณากรอก 'เวลา' ครับ"); return; }

            if (editingTaskId) {
                const taskIndex = tasks.findIndex(t => t.id === editingTaskId);
                if (taskIndex > -1) {
                    tasks[taskIndex].category = category; tasks[taskIndex].text = text; tasks[taskIndex].date = date; tasks[taskIndex].time = time; tasks[taskIndex].notified = false; 
                }
                editingTaskId = null;
                document.getElementById('form-title').textContent = "เพิ่มรายการที่ต้องทำ";
                document.getElementById('btn-submit-task').textContent = "บันทึกรายการ";
                document.getElementById('date-input').classList.remove('edit-highlight');
                document.getElementById('time-input').classList.remove('edit-highlight');
            } else {
                tasks.push({ id: Date.now().toString(), category, text, date, time, notified: false });
            }
            document.getElementById('task-input').value = "";
            document.getElementById('time-input').value = "";
            setDefaultDate(); renderTaskBoard(); saveToDevice();
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id); if (!task) return;
            document.getElementById('category-select').value = task.category;
            document.getElementById('task-input').value = task.text;
            document.getElementById('date-input').value = task.date;
            const timeInput = document.getElementById('time-input'); timeInput.value = ""; 
            setTimeout(() => {
                timeInput.value = task.time; timeInput.classList.add('edit-highlight');
                document.getElementById('date-input').classList.add('edit-highlight');
            }, 50);
            editingTaskId = id;
            document.getElementById('form-title').textContent = "✍️ กำลังแก้ไขรายการ";
            document.getElementById('btn-submit-task').textContent = "💾 อัปเดตรายการที่แก้ไข";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteTask(id) {
            if (confirm("คุณต้องการลบงานนี้ใช่หรือไม่?")) {
                tasks = tasks.filter(t => t.id !== id);
                renderTaskBoard();
                saveToDevice();
            }
        }

        function renderTaskBoard() {
            const board = document.getElementById('task-board'); board.innerHTML = "";
            categories.forEach(cat => {
                const catTasks = tasks.filter(t => t.category === cat).sort((a, b) => {
                    return `${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`);
                });
                if (catTasks.length > 0) {
                    const card = document.createElement('div'); card.className = 'category-card';
                    const title = document.createElement('div'); title.className = 'category-title'; title.textContent = cat; card.appendChild(title);
                    const ul = document.createElement('ul');
                    catTasks.forEach(task => {
                        const li = document.createElement('li');
                        li.innerHTML = `
                            <div class="task-content-wrapper">
                                <button class="btn-delete-x" onclick="deleteTask('${task.id}')" title="ลบงานนี้">✖</button>
                                <span class="task-text">${task.text}</span>
                            </div>
                            <div class="task-badge-group">
                                <button class="btn-edit" onclick="editTask('${task.id}')">แก้ไข</button>
                                <span class="task-date">${formatDateDisplay(task.date)}</span>
                                <span class="task-time">${task.time}</span>
                            </div>
                        `;
                        ul.appendChild(li);
                    });
                    card.appendChild(ul); board.appendChild(card);
                }
            });
        }

        setInterval(() => {
            const now = new Date();
            const currentDate = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            tasks.forEach(task => {
                if (task.date === currentDate && task.time === currentTime && !task.notified) {
                    sendNotification(task.category, task.text); task.notified = true; saveToDevice();
                }
            });
        }, 1000);

        function sendNotification(category, taskMessage) {
            const title = `🚨 แจ้งเตือน: ${category}`;
            if (Notification.permission === "granted") {
                new Notification(title, { body: taskMessage, icon: "https://cdn-icons-png.flaticon.com/512/825/825590.png" });
            } else { alert(`${title}\nงาน: ${taskMessage}`); }
        }

        initApp();
    </script>
